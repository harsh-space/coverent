services:
  - type: web
    name: coverent-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
      - key: PROJECT_ID
        sync: false
